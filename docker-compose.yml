services:
  sshd-gateway:
    build: ./sshd-gateway
    container_name: sshd-gateway
    restart: unless-stopped
    ports:
      - "${SSH_PORT:-8008}:22"
    environment:
      FORWARD_PORT_BASE: 19000
    volumes:
      - ./keys:/keys:ro
    networks:
      - internal

  # 每个用户一个 opencode 容器。
